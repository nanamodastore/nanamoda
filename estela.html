<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo Estela</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

h1 {
  padding: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

button {
  margin: 20px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

.detalle img {
  width: 100%;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="catalogo">

<h1>Catálogo Estela</h1>

<div class="container">

<div class="card" onclick="verProducto('denim')">
<img src="BLUSA DENIM JEANS (1).png">
<h3>BLUSA DENIM JEANS</h3>
</div>

<div class="card" onclick="verProducto('carnero')">
<img src="CARNERO JEANS (1).png">
<h3>CARNERO JEANS</h3>
</div>

<div class="card" onclick="verProducto('clasica')">
<img src="CHAQUETA CLASICA (1).png">
<h3>CHAQUETA CLÁSICA</h3>
</div>

<div class="card" onclick="verProducto('parka')">
<img src="PARKA DE COLORES (1).png">
<h3>PARKA DE COLORES</h3>
</div>

<div class="card" onclick="verProducto('gama')">
<img src="BLUSA JEANS GAMA.png">
<h3>BLUSA JEANS GAMA</h3>
</div>

</div>

</div>

<!-- DETALLE -->
<div id="detalle" style="display:none; padding:20px;" class="detalle">

<button onclick="volver()">← Volver</button>

<div id="contenido"></div>

</div>

<script>

function verProducto(producto){

  document.getElementById("catalogo").style.display = "none";
  document.getElementById("detalle").style.display = "block";

  let html = "";

  if(producto === "denim"){
    html = `
      <h2>BLUSA DENIM JEANS</h2>
      <img src="BLUSA DENIM JEANS (1).png">
      <img src="BLUSA DENIM JEANS (2).png">
      <img src="BLUSA DENIM JEANS (3).png">
      <img src="BLUSA DENIM JEANS (4).png">
      <img src="BLUSA DENIM JEANS (5).png">
    `;
  }

  if(producto === "carnero"){
    html = `
      <h2>CARNERO JEANS</h2>
      <img src="CARNERO JEANS (1).png">
      <img src="CARNERO JEANS (2).png">
      <img src="CARNERO JEANS (3).png">
      <img src="CARNERO JEANS (4).png">
      <img src="CARNERO JEANS (5).png">
      <img src="CARNERO JEANS (6).png">
      <img src="CARNERO JEANS (7).png">
      <img src="CARNERO JEANS (8).png">
      <img src="CARNERO JEANS (9).png">
      <img src="CARNERO JEANS (10).png">
    `;
  }

  if(producto === "clasica"){
    html = `
      <h2>CHAQUETA CLÁSICA</h2>
      <img src="CHAQUETA CLASICA (1).png">
      <img src="CHAQUETA CLASICA (2).png">
      <img src="CHAQUETA CLASICA (3).png">
      <img src="CHAQUETA CLASICA (4).png">
      <img src="CHAQUETA CLASICA (5).png">
      <img src="CHAQUETA CLASICA (6).png">
      <img src="CHAQUETA CLASICA (7).png">
      <img src="CHAQUETA CLASICA (8).png">
      <img src="CHAQUETA CLASICA (9).png">
      <img src="CHAQUETA CLASICA (10).png">
    `;
  }

  if(producto === "parka"){
    html = `
      <h2>PARKA DE COLORES</h2>
      <img src="PARKA DE COLORES (1).png">
      <img src="PARKA DE COLORES (2).png">
      <img src="PARKA DE COLORES (3).png">
      <img src="PARKA DE COLORES (4).png">
      <img src="PARKA DE COLORES (5).png">
      <img src="PARKA DE COLORES (6).png">
    `;
  }

  if(producto === "gama"){
    html = `
      <h2>BLUSA JEANS GAMA</h2>
      <img src="BLUSA JEANS GAMA.png">
    `;
  }

  document.getElementById("contenido").innerHTML = html;
}

function volver(){
  document.getElementById("catalogo").style.display = "block";
  document.getElementById("detalle").style.display = "none";
}

</script>

</body>
</html>
