<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo Estela</title>

<style>
body { font-family: Arial; background: #f5f5f5; }

h1 { padding: 20px; }

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.thumbs {
  display: flex;
  gap: 5px;
  margin-top: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.thumbs img {
  width: 50px;
  cursor: pointer;
  border-radius: 5px;
}

button {
  margin: 20px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<a href="index.html"><button>← Volver</button></a>

<h1>Catálogo Estela</h1>

<div class="container">

<!-- BLUSA DENIM -->
<div class="card">
  <img id="denim" src="BLUSA DENIM JEANS (1).png">
  <div class="thumbs">
    <img src="BLUSA DENIM JEANS (1).png" onclick="cambiar('denim', this)">
    <img src="BLUSA DENIM JEANS (2).png" onclick="cambiar('denim', this)">
    <img src="BLUSA DENIM JEANS (3).png" onclick="cambiar('denim', this)">
    <img src="BLUSA DENIM JEANS (4).png" onclick="cambiar('denim', this)">
    <img src="BLUSA DENIM JEANS (5).png" onclick="cambiar('denim', this)">
  </div>
  <h3>BLUSA DENIM JEANS</h3>
</div>

<!-- BLUSA GAMA -->
<div class="card">
  <img src="BLUSA JEANS GAMA.png">
  <h3>BLUSA JEANS GAMA</h3>
</div>

<!-- CARNERO -->
<div class="card">
  <img id="carnero" src="CARNERO JEANS (1).png">
  <div class="thumbs">
    <img src="CARNERO JEANS (1).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (2).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (3).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (4).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (5).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (6).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (7).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (8).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (9).png" onclick="cambiar('carnero', this)">
    <img src="CARNERO JEANS (10).png" onclick="cambiar('carnero', this)">
  </div>
  <h3>CARNERO JEANS</h3>
</div>

<!-- CHAQUETA CLASICA -->
<div class="card">
  <img id="clasica" src="CHAQUETA CLASICA (1).png">
  <div class="thumbs">
    <img src="CHAQUETA CLASICA (1).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (2).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (3).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (4).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (5).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (6).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (7).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (8).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (9).png" onclick="cambiar('clasica', this)">
    <img src="CHAQUETA CLASICA (10).png" onclick="cambiar('clasica', this)">
  </div>
  <h3>CHAQUETA CLÁSICA</h3>
</div>

<!-- CHAQUETA GAMA -->
<div class="card">
  <img src="CHAQUETA CLASICA GAMA.png">
  <h3>CHAQUETA CLÁSICA GAMA</h3>
</div>

<!-- CHAQUETA MEZCLILLA -->
<div class="card">
  <img src="CHAQUETA PARKA DE MEZCLILLA.png">
  <h3>PARKA MEZCLILLA</h3>
</div>

<!-- PARKA COLORES -->
<div class="card">
  <img id="parka" src="PARKA DE COLORES (1).png">
  <div class="thumbs">
    <img src="PARKA DE COLORES (1).png" onclick="cambiar('parka', this)">
    <img src="PARKA DE COLORES (2).png" onclick="cambiar('parka', this)">
    <img src="PARKA DE COLORES (3).png" onclick="cambiar('parka', this)">
    <img src="PARKA DE COLORES (4).png" onclick="cambiar('parka', this)">
    <img src="PARKA DE COLORES (5).png" onclick="cambiar('parka', this)">
    <img src="PARKA DE COLORES (6).png" onclick="cambiar('parka', this)">
  </div>
  <h3>PARKA DE COLORES</h3>
</div>

</div>

<script>
function cambiar(id, img){
  document.getElementById(id).src = img.src;
}
</script>

</body>
</html>
