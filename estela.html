<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Estela</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

h1 {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 8px;
}

.btn {
  background: black;
  color: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 30px;
  cursor: pointer;
  display: block;
}

#detalle {
  display: none;
  padding: 20px;
  text-align: center;
}

#detalle img {
  width: 100%;
  max-width: 400px;
}

.info {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>Catálogo Estela</h1>

<div id="catalogo" class="grid"></div>

<div id="detalle">
  <div class="info" id="infoDetalle"></div>
  <img id="imgDetalle">
  <br><br>
  <div class="btn" onclick="volver()">← Volver</div>
</div>

<script>

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSiWn8R9vUAlgIezd5vzPUXlM19e4BDxhc2UtNpN4BBJZibxnBUTScQLNuU0yNjD1Qwob2U3WO6HYgM/pub?output=csv")
.then(res => res.text())
.then(data => {

  const filas = data.split("\n").slice(1);

  const contenedor = document.getElementById("catalogo");

  filas.forEach(fila => {

    if(!fila.trim()) return;

    const cols = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    const nombre = cols[1]?.trim();
    const precio = cols[3]?.trim();
    const adelanto = cols[4]?.trim();
    let imagenes = cols[9]?.trim();

    if(!imagenes) return;

    imagenes = imagenes.replace(/^"|"$/g, "");
    const imgs = imagenes.split(",");

    const primera = "/img/" + imgs[0].trim();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${primera}">
      <div><b>${nombre}</b></div>
      <div class="btn" onclick="verDetalle('${nombre}','${precio}','${adelanto}','${imagenes}')">
        Ver detalles
      </div>
    `;

    contenedor.appendChild(card);

  });

});

function verDetalle(nombre, precio, adelanto, imagenes){
  document.getElementById("catalogo").style.display = "none";
  document.getElementById("detalle").style.display = "block";

  const imgs = imagenes.split(",");
  document.getElementById("imgDetalle").src = "/img/" + imgs[0].trim();

  document.getElementById("infoDetalle").innerHTML =
    nombre + "<br>₡" + precio + "<br>Adelanto ₡" + adelanto;
}

function volver(){
  document.getElementById("catalogo").style.display = "grid";
  document.getElementById("detalle").style.display = "none";
}

</script>

</body>
</html>
