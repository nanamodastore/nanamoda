
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Estela</title>

<style>
body {font-family: Arial; background:#f4f4f4; margin:0; padding:20px;}
.grid {display:grid; grid-template-columns:repeat(2,1fr); gap:20px;}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr);}}
.card{background:#fff; border-radius:15px; padding:10px; text-align:center;}
.card img{width:100%; height:250px; object-fit:contain;}
.btn{background:black; color:white; padding:12px 18px; border-radius:20px; cursor:pointer;}
.detalle{display:none; text-align:center;}
.detalle img{width:100%; max-width:500px; margin:10px auto; display:block;}
.info h1{font-size:28px;}
</style>

</head>
<body>

<h1>Catálogo Estela</h1>

<div id="catalogo" class="grid"></div>

<div id="detalle" class="detalle">
<button onclick="volver()">Volver</button>
<div id="infoDetalle"></div>
<div id="imagenesDetalle"></div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRDwwXbsHVrfPnUYNDVP4KKkKTI4oEUEzxZtEVHblAgyZ-5kQ6noaH9C9rzt0KM7txP1-VAr0RnL3fY/pub?output=csv";

fetch(URL)
.then(res=>res.text())
.then(data=>{
const filas=data.split("\n").slice(1);
const cont=document.getElementById("catalogo");

filas.forEach(f=>{
const cols=f.split(",");

const nombre=cols[1];
const tallas=cols[2];
const precio=cols[3];
const adelanto=cols[4];
const imagenes=cols.slice(9).join(",");

if(!nombre)return;

const primera=imagenes.split(",")[0];

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${primera}">
<div>${nombre}</div>
<div class="btn" onclick="verDetalle('${nombre}','${precio}','${adelanto}','${imagenes}')">Ver detalles</div>
`;

cont.appendChild(card);
});
});

function verDetalle(nombre,precio,adelanto,imagenes){
document.getElementById("catalogo").style.display="none";
document.getElementById("detalle").style.display="block";

document.getElementById("infoDetalle").innerHTML=`
<h2>${nombre}</h2>
<h1>₡${precio}</h1>
<h3>Adelanto: ₡${adelanto}</h3>
`;

const cont=document.getElementById("imagenesDetalle");
cont.innerHTML="";

imagenes.split(",").forEach(img=>{
const i=document.createElement("img");
i.src=img.trim();
cont.appendChild(i);
});
}

function volver(){
document.getElementById("catalogo").style.display="grid";
document.getElementById("detalle").style.display="none";
}
</script>

</body>
</html>
