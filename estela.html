<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Estela</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;}
h1{margin-bottom:20px;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

@media(max-width:768px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:#fff;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
}

.nombre{
margin:10px 0;
font-weight:bold;
}

.btn{
background:#000;
color:#fff;
padding:16px;
border-radius:25px;
cursor:pointer;
font-size:18px;
}

#detalle{
display:none;
text-align:center;
}

#detalle img{
width:90%;
max-width:400px;
margin-bottom:20px;
}

.info{
font-size:24px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Catálogo Estela</h1>

<div id="catalogo" class="grid"></div>

<div id="detalle">
<button onclick="volver()">⬅ Volver</button>
<br><br>
<img id="imgDetalle">
<div class="info" id="infoDetalle"></div>
</div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRDwwXbsHVrfPnUYNDVP4KKkKTI4oEUEzxZtEVHblAgyZ-5kQ6noaH9C9rzt0KM7txP1-VAr0RnL3fY/pub?output=csv")
.then(res=>res.text())
.then(data=>{
let filas=data.split("\n").slice(1);

filas.forEach(fila=>{
let col=fila.split(",");
if(col.length < 9) return;

let nombre=col[1]?.trim();
let precio=col[3]?.trim();
let adelanto=col[4]?.trim();
let imagenes=col[8]?.trim();

if(!nombre || nombre.toLowerCase()==="descripcion") return;

imagenes = imagenes.replace(/"/g,"").trim();

let lista = imagenes.split(",").map(i=>i.trim()).filter(i=>i!=="");
if(lista.length===0) return;

let primera = lista[0];

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="img/${primera}">
<div class="nombre">${nombre}</div>
<div class="btn" onclick="verDetalle('${nombre}','${precio}','${adelanto}','${imagenes}')">Ver detalles</div>
`;

document.getElementById("catalogo").appendChild(card);
});
});

function verDetalle(nombre,precio,adelanto,imagenes){
document.getElementById("catalogo").style.display="none";
document.getElementById("detalle").style.display="block";

imagenes = imagenes.replace(/"/g,"").trim();
let lista = imagenes.split(",").map(i=>i.trim());

let img = lista[0];

document.getElementById("imgDetalle").src="img/"+img;

document.getElementById("infoDetalle").innerHTML=`
${nombre}<br>
Precio: ₡${precio}<br>
Adelanto: ₡${adelanto}
`;
}

function volver(){
document.getElementById("catalogo").style.display="grid";
document.getElementById("detalle").style.display="none";
}
</script>

</body>
</html>
