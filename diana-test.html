<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Test</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 8px;
    border: 2px solid #e0e0e0; /* 🔥 marco */
    text-align: center;
}

.card img {
    width: 100%;
    height: auto;
    border-radius: 8px;
}

.precio {
    font-weight: bold;
    margin-top: 8px;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>Catálogo Diana (Test)</h1>

<div class="container">

<div class="card">
<img src="BLAZER ANDREA (1).png">
<div class="precio">₡16,500 / ₡10,000</div>
</div>

<div class="card">
<img src="BLAZER SAMANTA.png">
<div class="precio">₡16,500 / ₡10,000</div>
</div>

<div class="card">
<img src="BLAZER SOL.png">
<div class="precio">₡16,500 / ₡10,000</div>
</div>

<div class="card">
<img src="BLAZER ELIZA.png">
<div class="precio">₡16,500 / ₡10,000</div>
</div>

</div>

</body>
</html>
