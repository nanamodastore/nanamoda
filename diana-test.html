<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Test Mejorado</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

/* CARD */
.card {
    background: white;
    border-radius: 12px;
    padding: 10px;
    border: 2px solid black;
    text-align: center;

    display: flex;
    flex-direction: column;
    justify-content: space-between; /* 🔥 clave */
}

/* IMAGE */
.card img {
    width: 100%;
    height: auto;
    border-radius: 8px;
}

/* zoom */
.card img:hover {
    transform: scale(1.08);
}
/* TEXTO */
.precio {
    margin-top: auto;
    line-height: 1.3;
    font-weight: 600;
    font-size: 14px;
}

@media (max-width: 600px) {
    .precio {
        font-size: 11px !important;
    }
}

@media (min-width: 601px) {
    .precio {
        font-size: 15px;
    }
}
</style>
</head>

<body>

<h1>Catálogo Diana (Test Mejorado)</h1>

<div class="container">

<div class="card">
<img src="BLAZER ANDREA (1).png" onclick="verImagen(this.src)">
<div class="precio">
Precio: ₡16,500<br>
Adelanto: ₡10,000
</div>
</div>

<div class="card">
<img src="BLAZER SAMANTA.png">
<div class="precio">
Precio: ₡16,500<br>
Adelanto: ₡10,000
</div>
</div>

<div class="card">
<img src="BLAZER SOL.png">
<div class="precio">
Precio: ₡16,500<br>
Adelanto: ₡10,000
</div>
</div>

<div class="card">
<img src="BLAZER ELIZA.png">
<div class="precio">
Precio: ₡16,500<br>
Adelanto: ₡10,000
</div>
</div>

</div>

</body>
</html>
