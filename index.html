<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nana Moda</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

h1 {
  padding:20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;              /* MENOS espacio entre cards */
    padding: 10px;          /* MENOS margen lateral */
    max-width: 900px;       /* controla ancho en PC */
    margin: 0 auto;         /* centra */
}

.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    padding: 10px;
}

  .card img {
    width: 100%;
    height: auto;
    display: block;
}

.card h3 {
    text-align: center;
    font-size: 16px;   /* antes estaba pequeño */
    margin-top: 8px;
}
</style>
</head>

<body>

<h1>Catálogos</h1>

<div class="grid">

  <div class="card" onclick="location.href='estela.html'">
    <img src="CATALOGO ESTELA PORTADA.png">
    <h3>Catálogo Estela</h3>
  </div>

  <div class="card" onclick="location.href='diana.html'">
    <img src="CATALOGO DIANA PORTADA.png">
    <h3>Catálogo Diana</h3>
  </div>
  
<div class="card" onclick="window.location.href='aero.html'">
    <img src="CATALOGO JACKETS AERO.jpg">
    <h3>Catálogo Jackets Aero</h3>
</div>
</div>

</body>
</html>
