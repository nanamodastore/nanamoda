<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nana Moda</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

h1 {
  padding:20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
  padding:20px;
}

.card {
  background:white;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:260px;
  object-fit:cover;
}

.card h3 {
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<h1>Catálogos</h1>

<div class="grid">

  <div class="card" onclick="location.href='estela.html'">
    <img src="CATALOGO ESTELA PORTADA.png">
    <h3>Catálogo Estela</h3>
  </div>

  <div class="card" onclick="location.href='diana.html'">
    <img src="CATALOGO DIANA PORTADA.png">
    <h3>Catálogo Diana</h3>
  </div>
  
<div class="card" onclick="window.location.href='aero-test.html'">
    <img src="CATALOGO JACKETS AERO.jpg">
    <h3>Catálogo Jackets Aero</h3>
</div>
</div>

</body>
</html>
