<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo Diana</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

h1 {
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  border: 2px solid black;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* BOTÓN */
button {
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

/* DETALLE */
.detalle {
  display: none;
  padding: 20px;
}

.detalle img {
  width: 100%;
  max-width: 500px;
  display: block;
  margin: auto;
}

.precio {
  text-align: center;
  font-weight: bold;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<a href="index.html"><button>← Volver</button></a>

<h1>Catálogo Diana</h1>

<div id="catalogo" class="grid">

<!-- ANDREA (ARREGLADO) -->
<div class="card" onclick="verProducto('p1')">
  <img src="BLAZER ANDREA (1).png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p2')">
  <img src="BLAZER ANDREA (2).png">
  <button>Ver detalles</button>
</div>

<!-- RESTO -->
<div class="card" onclick="verProducto('p3')">
  <img src="BLAZER SAMANTA.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p4')">
  <img src="BLAZER SOL.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p5')">
  <img src="BLAZER ELIZA.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p6')">
  <img src="BLUSA BELEN.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p7')">
  <img src="BLUSA CINTIA.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p8')">
  <img src="BLUSA FATIMA.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p9')">
  <img src="BLUSA IVON.png">
  <button>Ver detalles</button>
</div>

</div>

<!-- DETALLE -->
<div id="detalle" class="detalle">
  <button onclick="volver()">← Volver</button>

  <div class="precio">
    Precio: ₡16,500<br>
    Adelanto: ₡10,000
  </div>

  <img id="imgDetalle">
</div>

<script>
function verProducto(id) {
  document.getElementById("catalogo").style.display = "none";
  document.getElementById("detalle").style.display = "block";

  const imagenes = {
    p1: "BLAZER ANDREA (1).png",
    p2: "BLAZER ANDREA (2).png",
    p3: "BLAZER SAMANTA.png",
    p4: "BLAZER SOL.png",
    p5: "BLAZER ELIZA.png",
    p6: "BLUSA BELEN.png",
    p7: "BLUSA CINTIA.png",
    p8: "BLUSA FATIMA.png",
    p9: "BLUSA IVON.png"
  };

  document.getElementById("imgDetalle").src = imagenes[id];
}

function volver() {
  document.getElementById("catalogo").style.display = "grid";
  document.getElementById("detalle").style.display = "none";
}
</script>

</body>
</html>
