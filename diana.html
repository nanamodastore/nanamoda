<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo Diana</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

h1 {
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  /* MOBILE (2 columnas) */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

/* PC (máximo 3 columnas) */
@media (min-width: 768px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  border: 2px solid black;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* BOTÓN */
button {
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

/* DETALLE */
.detalle {
  display: none;
  padding: 20px;
}

.detalle img {
  width: 100%;
  max-width: 500px;
  display: block;
  margin: auto;
}

.precio {
  text-align: center;
  font-weight: bold;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<a href="index.html"><button>← Volver</button></a>

<h1>Catálogo Diana</h1>

<div id="catalogo" class="grid">

<!-- ANDREA (ARREGLADO) -->
<div class="card" onclick="verProducto('p1')">
  <img src="BLAZER ANDREA (1).png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p2')">
  <img src="BLAZER ANDREA (2).png">
  <button>Ver detalles</button>
</div>

<!-- RESTO -->
<div class="card" onclick="verProducto('p3')">
  <img src="BLAZER SAMANTA.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p4')">
  <img src="BLAZER SOL.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p5')">
  <img src="BLAZER ELIZA.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p6')">
  <img src="BLUSA BELEN.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p7')">
  <img src="BLUSA CINTIA.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p8')">
  <img src="BLUSA FATIMA.png">
  <button>Ver detalles</button>
</div>

<div class="card" onclick="verProducto('p9')">
  <img src="BLUSA IVON.png">
  <button>Ver detalles</button>
</div>

</div>

<!-- DETALLE -->
<div id="detalle" class="detalle">
  <button onclick="volver()">← Volver</button>

  <div class="precio">
    Precio: ₡16,500<br>
    Adelanto: ₡10,000
  </div>

  <img id="imgDetalle">
</div>

<script>
function verProducto(id) {
  document.getElementById("catalogo").style.display = "none";
  document.getElementById("detalle").style.display = "block";

 const productos = {
  p1: { img: "BLAZER ANDREA (1).png", precio: "₡16,500", adelanto: "₡10,000" },
  p2: { img: "BLAZER ANDREA (2).png", precio: "₡16,500", adelanto: "₡10,000" },
  p3: { img: "BLAZER SAMANTA.png", precio: "₡16,500", adelanto: "₡10,000" },
  p4: { img: "BLAZER SOL.png", precio: "₡16,500", adelanto: "₡10,000" },
  p5: { img: "BLAZER ELIZA.png", precio: "₡16,500", adelanto: "₡10,000" },
  p6: { img: "BLUSA BELEN.png", precio: "₡14,500", adelanto: "₡8,500" },
  p7: { img: "BLUSA CINTIA.png", precio: "₡14,500", adelanto: "₡8,500" },
  p8: { img: "BLUSA FATIMA.png", precio: "₡14,500", adelanto: "₡8,500" },
  p9: { img: "BLUSA IVON.png", precio: "₡14,500", adelanto: "₡8,500" }
};

  const p = productos[id];

document.getElementById("imgDetalle").src = p.img;
document.getElementById("precio").innerText = p.precio;
document.getElementById("adelanto").innerText = p.adelanto;
}

function volver() {
  document.getElementById("catalogo").style.display = "grid";
  document.getElementById("detalle").style.display = "none";
}
</script>

</body>
</html>
