<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
<style>
body{font-family:Arial}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{padding:10px;border:1px solid #ccc;text-align:center}
img{width:100%;height:250px;object-fit:cover}
.btn{background:black;color:white;padding:10px;margin-top:10px;cursor:pointer}
</style>
</head>
<body>

<div id="catalogo" class="grid">

    <div class="card">
        <img src="/img/BLUSA DENIM JEANS (1).jpg">
        <h3>BLUSA DENIM  JEANS</h3>
        <div class="btn" onclick="ver('BLUSA DENIM  JEANS','14500','8500','BLUSA DENIM JEANS (1).jpg')">Ver detalles</div>
    </div>
    
    <div class="card">
        <img src="/img/CHAQUETA PARKA DE MEZCLILLA (1).jpg">
        <h3>CHAQUETA PARKA  DE MEZCLILLA</h3>
        <div class="btn" onclick="ver('CHAQUETA PARKA  DE MEZCLILLA','20900','13500','CHAQUETA PARKA DE MEZCLILLA (1).jpg')">Ver detalles</div>
    </div>
    
</div>

<div id="detalle" style="display:none;text-align:center">
<h2 id="nombre"></h2>
<div id="info"></div>
<img id="img" style="width:300px">
<br><br>
<button onclick="volver()">Volver</button>
</div>

<script>
function ver(n,p,a,i){
document.getElementById('catalogo').style.display='none';
document.getElementById('detalle').style.display='block';
document.getElementById('nombre').innerText=n;
document.getElementById('info').innerText='₡'+p+' | Adelanto ₡'+a;
document.getElementById('img').src='/img/'+i;
}

function volver(){
document.getElementById('catalogo').style.display='grid';
document.getElementById('detalle').style.display='none';
}
</script>

</body>
</html>
